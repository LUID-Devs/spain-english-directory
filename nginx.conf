user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/x-javascript
        application/javascript
        application/xml+rss
        application/json;

    # DNS resolver for runtime hostname resolution
    # 127.0.0.11 is Docker's internal DNS resolver
    # 8.8.8.8 is Google's public DNS as fallback
    resolver 127.0.0.11 8.8.8.8 valid=30s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # ============================================
        # API PROXY - MUST BE FIRST (before static files)
        # These routes proxy to the backend API server
        # Using variables to defer DNS resolution to request time
        # ============================================

        # OAuth callback/reset-password are frontend SPA routes and must not hit backend auth proxy.
        # Keep these exact matches above the generic /auth/ proxy to avoid SSO callback 502s.
        location = /auth/callback {
            try_files /index.html =404;
        }

        location = /auth/callback/ {
            try_files /index.html =404;
        }

        location = /auth/reset-password {
            try_files /index.html =404;
        }

        location = /auth/reset-password/ {
            try_files /index.html =404;
        }

        # Auth API routes
        location /auth/ {
            set $backend "${BACKEND_HOST}";
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            
            # Connection settings
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Headers - use $host for original client host header (consistent with other routes)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            # Error handling
            proxy_intercept_errors on;
            error_page 500 502 503 504 = @api_json_error;
        }

        # API routes (Mission Control, webhooks, etc.)
        location /api/ {
            set $backend "${BACKEND_HOST}";
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            
            # Connection settings
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Headers - use $host for original client host header (consistent with other routes)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # Buffer settings for better performance
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            # Error handling - intercept errors and return JSON
            proxy_intercept_errors on;
            error_page 500 502 503 504 = @api_json_error;
        }

        # Project routes
        location /projects/ {
            set $backend "${BACKEND_HOST}";
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 5s;
        }

        # Task routes
        location /tasks/ {
            set $backend "${BACKEND_HOST}";
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 5s;
        }

        # Search routes
        location /search/ {
            set $backend "${BACKEND_HOST}";
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 5s;
        }

        # User routes
        location /users/ {
            set $backend "${BACKEND_HOST}";
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 5s;
        }

        # Team routes
        location /teams/ {
            set $backend "${BACKEND_HOST}";
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 5s;
        }

        # Credits routes
        location /credits/ {
            set $backend "${BACKEND_HOST}";
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 5s;
        }

        # Organization routes
        location /organizations/ {
            set $backend "${BACKEND_HOST}";
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 5s;
        }

        # Goals routes
        location /goals/ {
            set $backend "${BACKEND_HOST}";
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 5s;
        }

        # Agents routes (Mission Control)
        location /agents/ {
            set $backend "${BACKEND_HOST}";
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 5s;
        }

        # Notifications routes
        location /notifications/ {
            set $backend "${BACKEND_HOST}";
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 5s;
        }

        # User Notifications routes
        location /user-notifications/ {
            set $backend "${BACKEND_HOST}";
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 5s;
        }

        # File uploads
        location /uploads/ {
            set $backend "${BACKEND_HOST}";
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 5s;
            client_max_body_size 50M;
        }

        # Comment routes (mounted at root)
        location ~ ^/comments(/.*)?$ {
            set $backend "${BACKEND_HOST}";
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 5s;
        }

        # Attachment routes (mounted at root)
        location ~ ^/attachments(/.*)?$ {
            set $backend "${BACKEND_HOST}";
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 5s;
        }

        # API Documentation
        location /api-docs {
            set $backend "${BACKEND_HOST}";
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
        }

        # Health check - serves static file for container health checks
        # This must NOT proxy to backend, as the backend may not be available
        # during frontend container startup (circular dependency)
        location = /health {
            access_log off;
            add_header Content-Type text/html;
            return 200 '<!DOCTYPE html><html><body>healthy</body></html>';
        }

        # ============================================
        # API ERROR HANDLING
        # Return JSON instead of HTML when backend errors occur
        # ============================================

        # Unified error handler for API routes with diagnostic info
        location @api_json_error {
            default_type application/json;
            add_header Cache-Control 'no-cache, no-store, must-revalidate' always;
            return 502 '{"error":"Bad Gateway","message":"Backend service is temporarily unavailable","status":502,"timestamp":"$time_iso8601","request_id":"$request_id"}';
        }

        # ============================================
        # STATIC FILES & SPA FALLBACK
        # ============================================

        # Static files that must return proper content (not SPA fallback)
        location = /robots.txt {
            add_header Content-Type text/plain;
            try_files $uri =404;
        }

        location = /sitemap.xml {
            add_header Content-Type application/xml;
            try_files $uri =404;
        }

        # ============================================
        # STATIC PRERENDERED PAGES (SEO)
        # Serve prerendered HTML for public pages
        # These routes have pre-generated HTML content
        # ============================================
        
        # Landing page
        location = /landing {
            try_files /landing/index.html =404;
        }
        
        location = /landing/ {
            try_files /landing/index.html =404;
        }
        
        # Auth pages
        location = /auth/login {
            try_files /auth/login/index.html =404;
        }
        
        location = /auth/login/ {
            try_files /auth/login/index.html =404;
        }
        
        location = /auth/register {
            try_files /auth/register/index.html =404;
        }
        
        location = /auth/register/ {
            try_files /auth/register/index.html =404;
        }
        
        location = /auth/forgot-password {
            try_files /auth/forgot-password/index.html =404;
        }
        
        location = /auth/forgot-password/ {
            try_files /auth/forgot-password/index.html =404;
        }
        
        # Public marketing pages
        location = /pricing {
            try_files /pricing/index.html =404;
        }
        
        location = /pricing/ {
            try_files /pricing/index.html =404;
        }
        
        location = /features {
            try_files /features/index.html =404;
        }
        
        location = /features/ {
            try_files /features/index.html =404;
        }
        
        # Legal pages
        location = /privacy {
            try_files /privacy/index.html =404;
        }
        
        location = /privacy/ {
            try_files /privacy/index.html =404;
        }
        
        location = /terms {
            try_files /terms/index.html =404;
        }
        
        location = /terms/ {
            try_files /terms/index.html =404;
        }
        
        location = /cookies {
            try_files /cookies/index.html =404;
        }
        
        location = /cookies/ {
            try_files /cookies/index.html =404;
        }
        
        # Help & Docs pages
        location = /help {
            try_files /help/index.html =404;
        }
        
        location = /help/ {
            try_files /help/index.html =404;
        }
        
        location = /docs {
            try_files /docs/index.html =404;
        }
        
        location = /docs/ {
            try_files /docs/index.html =404;
        }
        
        # Legacy redirect pages (for SEO/backward compatibility)
        location = /login {
            try_files /login/index.html =404;
        }
        
        location = /login/ {
            try_files /login/index.html =404;
        }
        
        location = /register {
            try_files /register/index.html =404;
        }
        
        location = /register/ {
            try_files /register/index.html =404;
        }
        
        location = /forgot-password {
            try_files /forgot-password/index.html =404;
        }
        
        location = /forgot-password/ {
            try_files /forgot-password/index.html =404;
        }

        # Handle client-side routing - only for known routes
        # Explicitly exclude API-like paths to return 404 instead of SPA
        location / {
            # First try to serve the file/directory
            # If not found, check if it looks like a file (has extension)
            # Files that don't exist should 404, not serve index.html
            try_files $uri $uri/ @spa_fallback;
        }

        # Location for SPA fallback - only for routes without file extensions
        location @spa_fallback {
            # Check if the request looks like it's for a file (has extension)
            # If so, return 404. Otherwise serve the SPA.
            if ($uri ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|json|xml|txt|pdf|zip|gz|woff|woff2|ttf|otf|eot|map)$) {
                return 404;
            }
            # Serve the SPA for client-side routes
            try_files /index.html =404;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # HSTS - Force HTTPS for 1 year, include subdomains, preload eligible
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        
        # CSP Policy - HTTPS only to prevent mixed content vulnerabilities
        # Removed 'http:' from default-src to enforce secure connections
        # frame-src: Required for Cognito hosted UI sign-in flows
        # connect-src: Required for Cognito API calls (token refresh, user info)
        # script-src/style-src: Required for inline scripts/styles in Cognito UI
        # Note: Using explicit Cognito domains instead of wildcards for better browser support
        # Fixed: Added all regional Cognito endpoints to prevent CSP violations
        add_header Content-Security-Policy "default-src 'self' https: data: blob: 'unsafe-inline'; connect-src 'self' wss://api.taskluid.com https://api.taskluid.com https://*.amazoncognito.com https://cognito-idp.us-east-1.amazonaws.com https://cognito-identity.us-east-1.amazonaws.com https://cognito-idp.us-west-2.amazonaws.com https://cognito-identity.us-west-2.amazonaws.com https://cognito-idp.eu-west-1.amazonaws.com https://cognito-identity.eu-west-1.amazonaws.com; frame-src 'self' https://*.amazoncognito.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.amazoncognito.com; style-src 'self' 'unsafe-inline' https://*.amazoncognito.com; upgrade-insecure-requests;" always;
    }
}
