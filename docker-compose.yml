version: '3.8'

services:
  taskluid-frontend:
    build: .
    container_name: taskluid-frontend
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    env_file:
      - .env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "app=taskluid-frontend"
      - "environment=production"