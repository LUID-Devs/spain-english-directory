version: '3.8'

services:
  taskluid-frontend:
    image: ghcr.io/luid-devs/task-luid-web:latest
    container_name: taskluid-frontend
    init: true
    pull_policy: always
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    env_file:
      - .env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "app=taskluid-frontend"
      - "environment=production"
    # Join backend network so /auth/* and other proxied API paths can resolve task-luid-backend.
    networks:
      - default
      - backend-app-network

networks:
  # Backend stack runs in a separate compose project; attach via its shared bridge network.
  backend-app-network:
    external: true
    name: ${BACKEND_DOCKER_NETWORK:-task-luid-backend_app-network}
