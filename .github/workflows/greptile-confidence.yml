name: Greptile Confidence Gate
on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: greptile-confidence-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  confidence_gate:
    runs-on: self-hosted
    permissions:
      checks: read
      pull-requests: read
    steps:
      - name: Wait for checks then validate Greptile confidence
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const pullNumber = pr?.number;
            const headSha = pr?.head?.sha;
            if (!pullNumber || !headSha) {
              core.notice("No PR context available; skipping confidence gate");
              return;
            }

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const maxAttempts = 40;
            let hasPendingChecks = false;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const { data } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha,
                per_page: 100
              });

              const pending = data.check_runs.filter((run) => {
                const isThisWorkflow =
                  run.app?.slug === "github-actions" &&
                  run.name.includes("Greptile Confidence Gate");
                return !isThisWorkflow && run.status !== "completed";
              });

              hasPendingChecks = pending.length > 0;
              if (!hasPendingChecks) {
                core.info("All other checks are completed; running confidence gate now.");
                break;
              }

              core.info(
                `Waiting for ${pending.length} check(s) to complete (attempt ${attempt}/${maxAttempts})...`
              );
              await sleep(15000);
            }

            if (hasPendingChecks) {
              core.notice("Some checks are still running after timeout; continuing confidence validation.");
            }

            const { data: prData } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber
            });

            const text = (prData.body || "").replace(/<[^>]+>/g, "");
            const m = text.match(/Confidence Score:\s*([0-5](?:\.\d+)?)\s*\/\s*5/i);

            if (!m) {
              core.setFailed("Greptile confidence score not found in PR body");
              return;
            }

            const score = parseFloat(m[1]);
            if (score < 4) core.setFailed(`Greptile confidence ${score}/5 < 4/5`);
            else console.log(`Greptile confidence ${score}/5 ✅`);
