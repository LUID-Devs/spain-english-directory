name: Greptile Confidence Gate
on:
  check_run:
    types: [completed]

jobs:
  confidence_gate:
    if: github.event.check_run.name == 'Greptile Review'
    runs-on: self-hosted
    permissions:
      pull-requests: read
    steps:
      - name: Check Greptile confidence
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.check_run.pull_requests?.[0];
            if (!pr) {
              core.notice("No PR attached to Greptile check; skipping confidence gate");
              return;
            }

            const { data: prData } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });

            const text = (prData.body || "").replace(/<[^>]+>/g, "");
            const m = text.match(/Confidence Score:\s*(\d)\s*\/\s*5/);

            if (!m) {
              core.setFailed("Greptile confidence score not found in PR body");
              return;
            }

            const score = parseInt(m[1], 10);
            if (score < 4) core.setFailed(`Greptile confidence ${score}/5 < 4/5`);
            else console.log(`Greptile confidence ${score}/5 ✅`);
