name: Greptile Confidence Gate
on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  confidence_gate:
    runs-on: self-hosted
    permissions:
      pull-requests: read
    steps:
      - name: Check Greptile confidence
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Prefer PR body (Greptile summary appended there)
            const bodies = [];
            if (pr.body) bodies.push(pr.body);

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });

            for (const r of reviews.reverse()) {
              if (r.user?.login?.includes("greptile") && r.body) {
                bodies.push(r.body);
                break;
              }
            }

            const text = bodies.join("\n\n").replace(/<[^>]+>/g, "");
            const m = text.match(/Confidence Score:\s*(\d)\s*\/\s*5/);

            if (!m) {
              core.setFailed("Greptile confidence score not found");
              return;
            }

            const score = parseInt(m[1], 10);
            if (score < 4) {
              core.setFailed(`Greptile confidence ${score}/5 < 4/5`);
            } else {
              console.log(`Greptile confidence ${score}/5 ✅`);
            }
