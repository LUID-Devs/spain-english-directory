name: Greptile Confidence Gate
on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: greptile-confidence-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  confidence_gate:
    runs-on: ubuntu-latest
    permissions:
      checks: read
      pull-requests: read
    steps:
      - name: Wait for checks then validate Greptile confidence
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const pullNumber = pr?.number;
            const headSha = pr?.head?.sha;
            if (!pullNumber || !headSha) {
              core.notice("No PR context available; skipping confidence gate");
              return;
            }

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const maxAttempts = 18;
            const pollIntervalMs = 10000;
            let pendingChecks = [];

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const { data } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha,
                per_page: 100
              });

              pendingChecks = data.check_runs.filter((run) => {
                const isGitHubActions = run.app?.slug === "github-actions";
                const isConfidenceGate = /Greptile Confidence Gate/i.test(run.name || "");
                return isGitHubActions && !isConfidenceGate && run.status !== "completed";
              });

              if (pendingChecks.length === 0) {
                core.info("All other GitHub Actions checks are completed; running confidence gate now.");
                break;
              }

              const pendingNames = pendingChecks.map((run) => run.name).slice(0, 5).join(", ");
              if (attempt === 1 || attempt % 3 === 0 || attempt === maxAttempts) {
                core.info(
                  `Waiting on ${pendingChecks.length} GitHub Actions check(s): ${pendingNames}${pendingChecks.length > 5 ? ", ..." : ""} (attempt ${attempt}/${maxAttempts})`
                );
              } else {
                core.info(
                  `Waiting for ${pendingChecks.length} check(s) to complete (attempt ${attempt}/${maxAttempts})...`
                );
              }
              await sleep(pollIntervalMs);
            }

            if (pendingChecks.length > 0) {
              const pendingNames = pendingChecks.map((run) => run.name).join(", ");
              core.notice(
                `Timed out waiting for checks; continuing confidence validation. Pending: ${pendingNames}`
              );
            }

            const { data: prData } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber
            });

            const text = (prData.body || "").replace(/<[^>]+>/g, "");
            const m = text.match(/Confidence Score:\s*([0-5](?:\.\d+)?)\s*\/\s*5/i);

            if (!m) {
              core.setFailed("Greptile confidence score not found in PR body");
              return;
            }

            const score = parseFloat(m[1]);
            if (score < 4) core.setFailed(`Greptile confidence ${score}/5 < 4/5`);
            else console.log(`Greptile confidence ${score}/5 ✅`);
