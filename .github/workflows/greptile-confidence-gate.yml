name: Greptile Confidence Gate
on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: greptile-confidence-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  confidence_gate:
    runs-on: ${{ vars.GREPTILE_CONFIDENCE_RUNNER || 'self-hosted' }}
    permissions:
      checks: read
      pull-requests: read
    steps:
      - name: Wait for checks then validate Greptile confidence
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const pullNumber = pr?.number;
            const headSha = pr?.head?.sha;
            const action = context.payload.action;
            if (!pullNumber || !headSha) {
              core.notice("No PR context available; skipping confidence gate");
              return;
            }

            const { data: existingChecks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
              check_name: "confidence_gate",
              per_page: 100
            });

            const priorCompleted = existingChecks.check_runs.find((run) => {
              const isGitHubActions = run.app?.slug === "github-actions";
              const isCurrentRun = (run.details_url || "").includes(`/actions/runs/${context.runId}/`);
              return isGitHubActions && !isCurrentRun && run.status === "completed";
            });

            if (priorCompleted && action !== "edited") {
              core.notice(
                `Reusing prior confidence gate result for ${headSha.slice(0, 7)} (${priorCompleted.conclusion}); skipping duplicate run.`
              );
              return;
            }

            const perPage = 100;
            const fetchAll = async (fn, params) => {
              const results = [];
              let page = 1;
              while (true) {
                const { data } = await fn({
                  ...params,
                  per_page: perPage,
                  page
                });
                if (!data || data.length === 0) break;
                results.push(...data);
                if (data.length < perPage) break;
                page += 1;
              }
              return results;
            };

            const issueComments = await fetchAll(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullNumber
            });

            const reviews = await fetchAll(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber
            });

            const isGreptileAuthor = (author) => {
              if (!author) return false;
              const login = (author.login || "").toLowerCase();
              return login.includes("greptile");
            };

            const entries = [
              ...issueComments.map((comment) => ({
                body: comment.body || "",
                created_at: comment.created_at,
                author: comment.user
              })),
              ...reviews.map((review) => ({
                body: review.body || "",
                created_at: review.submitted_at || review.created_at,
                author: review.user
              }))
            ]
              .filter((entry) => isGreptileAuthor(entry.author))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const scoreMatch = (text) => {
              const clean = (text || "").replace(/<[^>]+>/g, "");
              return clean.match(/Confidence Score:\s*([0-5](?:\.\d+)?)\s*\/\s*5/i);
            };

            let matchedEntry = entries.find((entry) => scoreMatch(entry.body));
            let matchedBody = matchedEntry?.body;

            if (!matchedEntry) {
              const prBody = pr?.body || "";
              const hasGreptileBlock = prBody.includes("<!-- greptile_comment -->");
              const bodyMatch = hasGreptileBlock ? scoreMatch(prBody) : null;
              const lastReviewedMatch = prBody.match(/Last reviewed commit:\s*([a-f0-9]{7,40})/i);
              const reviewedSha = lastReviewedMatch?.[1] || "";
              const reviewedMatchesHead = reviewedSha && headSha.startsWith(reviewedSha);

              if (bodyMatch && reviewedMatchesHead) {
                matchedBody = prBody;
              } else {
                core.setFailed("Greptile confidence score not found in Greptile comments/reviews");
                return;
              }
            }

            const m = scoreMatch(matchedBody);
            if (!m) {
              core.setFailed("Greptile confidence score format is invalid");
              return;
            }

            const score = parseFloat(m[1]);
            if (score < 4) core.setFailed(`Greptile confidence ${score}/5 < 4/5`);
            else console.log(`Greptile confidence ${score}/5 ✅`);
