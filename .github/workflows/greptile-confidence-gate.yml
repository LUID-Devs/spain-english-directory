name: Greptile Confidence Gate
on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: greptile-confidence-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  confidence_gate:
    runs-on: ${{ vars.GREPTILE_CONFIDENCE_RUNNER || 'self-hosted' }}
    permissions:
      checks: read
      pull-requests: read
      issues: read
    steps:
      - name: Wait for checks then validate Greptile confidence
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const pullNumber = pr?.number;
            const headSha = pr?.head?.sha;
            const action = context.payload.action;
            if (!pullNumber || !headSha) {
              core.notice("No PR context available; skipping confidence gate");
              return;
            }

            const { data: existingChecks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
              check_name: "confidence_gate",
              per_page: 100
            });

            const priorCompleted = existingChecks.check_runs.find((run) => {
              const isGitHubActions = run.app?.slug === "github-actions";
              const isCurrentRun = (run.details_url || "").includes(`/actions/runs/${context.runId}/`);
              return isGitHubActions && !isCurrentRun && run.status === "completed";
            });

            if (priorCompleted && action !== "edited") {
              core.notice(
                `Reusing prior confidence gate result for ${headSha.slice(0, 7)} (${priorCompleted.conclusion}); skipping duplicate run.`
              );
              return;
            }

            const confidenceRegex = /Confidence Score:\s*([0-5](?:\.\d+)?)\s*\/\s*5/i;

            const issueComments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullNumber,
              per_page: 100,
            });

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
              per_page: 100,
            });

            const candidates = [];

            for (const c of issueComments) {
              const body = c.body || "";
              if (!confidenceRegex.test(body)) continue;
              if (!/greptile/i.test(c.user?.login || "")) continue;
              candidates.push({
                source: "comment",
                body,
                createdAt: c.created_at || c.updated_at,
              });
            }

            for (const r of reviews) {
              const body = r.body || "";
              if (!confidenceRegex.test(body)) continue;
              if (!/greptile/i.test(r.user?.login || "")) continue;
              candidates.push({
                source: "review",
                body,
                createdAt: r.submitted_at || r.updated_at || r.created_at,
              });
            }

            if (candidates.length === 0) {
              core.setFailed("Greptile confidence score not found in Greptile comments/reviews");
              return;
            }

            candidates.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
            const latest = candidates[candidates.length - 1];
            const m = latest.body.match(confidenceRegex);

            if (!m) {
              core.setFailed("Latest Greptile comment/review does not contain a valid confidence score");
              return;
            }

            const score = parseFloat(m[1]);
            if (score < 4) {
              core.setFailed(`Greptile confidence ${score}/5 < 4/5`);
            } else {
              console.log(`Greptile confidence ${score}/5 from latest ${latest.source} ✅`);
            }
