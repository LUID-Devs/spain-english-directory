name: Deploy TaskLuid Frontend

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: self-hosted
    name: 🏗️ Build Frontend
    permissions:
      contents: read
      packages: write
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: self-hosted
    name: 🚀 Deploy Frontend
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write

    steps:
      - name: 🔐 Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: 🚀 Deploy frontend locally
        run: |
          echo "🚀 Deploying TaskLuid frontend..."
          cd /opt/task-luid/task-luid-web
          
          echo "📦 Pulling latest image..."
          docker compose pull frontend
          
          echo "🔄 Restarting frontend..."
          docker compose up -d --force-recreate frontend
          
          echo "⏳ Waiting for startup..."
          sleep 10

      - name: 🏥 Health check with retry
        run: |
          echo "Checking frontend health..."
          for i in {1..6}; do
            if curl -f http://localhost:3000/health || curl -f http://localhost:3000; then
              echo "✅ Frontend is healthy!"
              exit 0
            fi
            echo "⏳ Attempt $i/6 - waiting 10s..."
            sleep 10
          done
          echo "❌ Health check failed"
          docker logs taskluid-frontend --tail 20
          exit 1

      - name: ✅ Deployment complete
        run: echo "🎉 Frontend deployed successfully!"
